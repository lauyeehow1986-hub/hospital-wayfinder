name: Deploy bot

# Deploys the Telegram→Claude Worker on push to main (when bot/ or the reused
# js/ modules change). Lets you deploy entirely from Android: just `git push`.
# Requires the CLOUDFLARE_API_TOKEN repository secret and a real KV namespace id
# in bot/wrangler.toml. Runtime secrets (ANTHROPIC_API_KEY, TELEGRAM_BOT_TOKEN,
# etc.) are set once in the Cloudflare dashboard. See bot/SETUP.md.

on:
  push:
    branches: [main]
    paths:
      - 'bot/**'
      - 'js/**'
      - '.github/workflows/deploy-bot.yml'
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install bot dependencies
        working-directory: bot
        run: npm install
      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: bot
          command: deploy
